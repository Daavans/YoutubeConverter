name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build and package
        run: cd desktop && pnpm run package:win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Yoink! ${{ github.ref_name }}
          body: |
            ## Install
            Download **Yoink! Setup.exe** below and run it.
            No additional software required — FFmpeg and yt-dlp are bundled.
          files: desktop/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
